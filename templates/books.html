{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books - Book Haven</title>
    <link rel="stylesheet" href="{% static 'css/books.css' %}">
</head>
<body>

<header>
    <h1>📚 Book Haven</h1>
    <nav>
        <a href="{% url 'home' %}">Home</a>

        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'signin' %}">Signup</a>
        {% endif %}
    </nav>
</header>

<section class="title">
    <h2>Explore Our Books</h2>
    <p>Most Selling books</p>
</section>

<section class="books-container">

    <div class="book-card">
        <img src="{% static 'images/book1.jpg' %}" alt="book">
        <h3>The Great Gatsby</h3>
        <p>₹299</p>
        <a href="{% url 'order' %}">
            <button>View All</button>
        </a>
    </div>

    <div class="book-card">
        <img src="{% static 'images/book2.jpg' %}" alt="book">
        <h3>Atonment</h3>
        <p>₹199</p>
        <a href="{% url 'order' %}">
            <button>View All</button>
        </a>
    </div>

    <div class="book-card">
        <img src="{% static 'images/book3.jpg' %}" alt="book">
        <h3>Game Of Thrones</h3>
        <p>₹250</p>
        <a href="{% url 'order' %}">
            <button>View All</button>
        </a>
    </div>

    <div class="book-card">
        <img src="{% static 'images/book4.jpg' %}" alt="book">
        <h3>History Of Ambedkar</h3>
        <p>₹220</p>
        <a href="{% url 'order' %}">
            <button>View All</button>
        </a>
    </div>

</section>

<footer>
    <p>📍 Chennai, India</p>
    <p>Email: bookhaven@gmail.com</p>
</footer>

</body>
</html>
